<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{title.text}">Mural</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:fragment="siteHeader">
    <div class="mural-header">
        <div class="language-menu">
            <a th:href="@{''(lang=pt)}" th:text="#{language.pt}">PT</a>
            <a th:href="@{''(lang=en)}" th:text="#{language.en}">EN</a>
            <a th:href="@{''(lang=fr)}" th:text="#{language.fr}">FR</a>
            <a th:href="@{''(lang=ja)}" th:text="#{language.ja}">JA</a>
        </div>
        <b th:text="#{header.user}">Usuário:</b>
        <span th:text="${#authentication.name}">Teste</span>
    </div>
</div>
</body>
</html>
