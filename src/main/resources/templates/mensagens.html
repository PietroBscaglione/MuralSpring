<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.text}">Mural</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:insert="~{cabecalho :: siteHeader}"></div>

    <h1 th:text="#{messages.heading}">Mensagens</h1>
    <ul>
        <li><a th:href="@{/}" th:text="#{nav.home}">Home</a></li>
        <li><a th:href="@{/postar}" th:text="#{nav.post}">Postar uma nova mensagem</a></li>
        <li><a th:href="@{/mensagens}" th:text="#{nav.refresh}">Atualizar página</a></li>
    </ul>
    <br>
    <div th:if="${success}" th:text="${success}" class="success-message"></div>
    <div th:if="${#lists.isEmpty(messages)}">
        <p th:text="#{messages.empty}">Sem mensagens.</p>
    </div>
    <div th:unless="${#lists.isEmpty(messages)}">
        <h4 th:text="#{messages.count(${messages.size()})}">Número de mensagens: 0</h4>
        <div th:each="msg : ${messages}">
            <div>
                <strong th:text="#{message.from}">De:</strong> <span th:text="${msg.from()}"></span>
                &nbsp;
                <strong th:text="#{message.to}">Para:</strong> <span th:text="${msg.to()}"></span>
                <span th:text="#{message.at(${msg.timestamp()})}">(em data)</span>
            </div>
            <div th:text="${msg.message()}"></div>
        </div>
    </div>

</body>
</html>
